name: Daily Job Digest

on:
  schedule:
    # GitHub Actions schedules drift 15-60 min at top-of-hour due to queue load.
    # 4x/day (down from 6x to cut Actions minutes) — dropped the 03:30 and 22:30
    # off-hours runs, kept morning→evening coverage.
    # BST = UTC+1 (summer): 6:30/10:30/14:30/18:30 UTC + ~30 min drift
    # ≈ 07:30 / 11:30 / 15:30 / 19:30 BST.
    # Shift all entries by +1 hour when UK clocks revert to GMT in autumn.
    - cron: '30 6,10,14,18 * * *'
  workflow_dispatch:
    inputs:
      ignore_seen_cache:
        description: 'Bypass seen-cache (validation mode, may send duplicates)'
        type: boolean
        default: false
      force_focus:
        description: 'Force Daily Focus category (overrides hour-based pick)'
        type: choice
        default: ''
        options:
          - ''
          - Quote
          - Term
          - Reflection
          - Industry
          - Podcast

concurrency:
  group: digest-cron
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install python-dotenv

      - name: Restore digest state cache
        uses: actions/cache@v4
        with:
          path: digest-data
          key: digest-state-${{ github.run_id }}
          restore-keys: |
            digest-state-

      - name: Write Firebase service account JSON
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          mkdir -p secrets
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > secrets/firebase.json
          # Sanity check: it should parse as JSON
          python -c "import json; json.load(open('secrets/firebase.json'))"

      - name: Run digest
        env:
          # SMTP / inbox delivery
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
          # Firebase
          FIREBASE_SERVICE_ACCOUNT_PATH: secrets/firebase.json
          FIREBASE_COLLECTION: ${{ secrets.FIREBASE_COLLECTION }}
          # LLMs
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          JOB_DIGEST_OPENROUTER_MODEL: ${{ secrets.JOB_DIGEST_OPENROUTER_MODEL }}
          JOB_DIGEST_GROQ_MODEL: ${{ secrets.JOB_DIGEST_GROQ_MODEL }}
          JOB_DIGEST_GROQ_MAX_JOBS: ${{ secrets.JOB_DIGEST_GROQ_MAX_JOBS }}
          # Output / cache location (cloud-friendly)
          JOB_DIGEST_BASE_DIR: ${{ github.workspace }}/digest-data
          JOB_DIGEST_TZ: ${{ secrets.JOB_DIGEST_TZ }}
          # Pipeline knobs
          JOB_DIGEST_WINDOW_HOURS: ${{ secrets.JOB_DIGEST_WINDOW_HOURS }}
          JOB_DIGEST_MIN_SCORE: ${{ secrets.JOB_DIGEST_MIN_SCORE }}
          JOB_DIGEST_MAX_EMAIL_ROLES: ${{ secrets.JOB_DIGEST_MAX_EMAIL_ROLES }}
          JOB_DIGEST_MIN_EMAIL_ROLES: ${{ secrets.JOB_DIGEST_MIN_EMAIL_ROLES }}
          JOB_DIGEST_MAX_BORDERLINE_EMAIL_ROLES: ${{ secrets.JOB_DIGEST_MAX_BORDERLINE_EMAIL_ROLES }}
          JOB_DIGEST_MIN_LINKEDIN_BORDERLINE_ROLES: ${{ secrets.JOB_DIGEST_MIN_LINKEDIN_BORDERLINE_ROLES }}
          JOB_DIGEST_EMAIL_BORDERLINE_MIN_SCORE: ${{ secrets.JOB_DIGEST_EMAIL_BORDERLINE_MIN_SCORE }}
          JOB_DIGEST_EMAIL_BORDERLINE_MAX_SCORE: ${{ secrets.JOB_DIGEST_EMAIL_BORDERLINE_MAX_SCORE }}
          JOB_DIGEST_PREFERENCES: ${{ secrets.JOB_DIGEST_PREFERENCES }}
          JOB_DIGEST_SEEN_CACHE_DAYS: ${{ secrets.JOB_DIGEST_SEEN_CACHE_DAYS }}
          JOB_DIGEST_EMAIL_ENABLED: ${{ secrets.JOB_DIGEST_EMAIL_ENABLED }}
          JOB_DIGEST_ALLOW_SEEN_TOP_UP: ${{ secrets.JOB_DIGEST_ALLOW_SEEN_TOP_UP }}
          JOB_DIGEST_WRITE_SLOT_DIGESTS: ${{ secrets.JOB_DIGEST_WRITE_SLOT_DIGESTS }}
          # LinkedIn timing
          JOB_DIGEST_LINKEDIN_DEADLINE_SECONDS: ${{ secrets.JOB_DIGEST_LINKEDIN_DEADLINE_SECONDS }}
          JOB_DIGEST_LINKEDIN_DETAILS_DEADLINE_SECONDS: ${{ secrets.JOB_DIGEST_LINKEDIN_DETAILS_DEADLINE_SECONDS }}
          JOB_DIGEST_LINKEDIN_DETAIL_TIMEOUT_SECONDS: ${{ secrets.JOB_DIGEST_LINKEDIN_DETAIL_TIMEOUT_SECONDS }}
          JOB_DIGEST_LINKEDIN_MAX_DETAIL_JOBS: ${{ secrets.JOB_DIGEST_LINKEDIN_MAX_DETAIL_JOBS }}
          JOB_DIGEST_LINKEDIN_TARGET_WINDOW_HOURS: ${{ secrets.JOB_DIGEST_LINKEDIN_TARGET_WINDOW_HOURS }}
          JOB_DIGEST_SOURCE_STAGE_TIMEOUT: ${{ secrets.JOB_DIGEST_SOURCE_STAGE_TIMEOUT }}
          # Diagnostics
          JOB_DIGEST_CUSTOM_DIAGNOSTICS: ${{ secrets.JOB_DIGEST_CUSTOM_DIAGNOSTICS }}
          JOB_DIGEST_CUSTOM_DIAGNOSTICS_LIMIT: ${{ secrets.JOB_DIGEST_CUSTOM_DIAGNOSTICS_LIMIT }}
          # Scheduling within runner (used by --force we override anyway)
          JOB_DIGEST_RUN_ATS: ${{ secrets.JOB_DIGEST_RUN_ATS }}
          JOB_DIGEST_RUN_WINDOW_MINUTES: ${{ secrets.JOB_DIGEST_RUN_WINDOW_MINUTES }}
          JOB_DIGEST_RUN_CATCH_UP_MINUTES: ${{ secrets.JOB_DIGEST_RUN_CATCH_UP_MINUTES }}
          # Site + auto-apply
          SITE_URL: ${{ secrets.SITE_URL }}
          AUTO_APPLY_HMAC_SECRET: ${{ secrets.AUTO_APPLY_HMAC_SECRET }}
          # Watchdog
          JOB_DIGEST_RUN_DEADLINE_SECONDS: '1200'
          # Manual override for Daily Focus category (empty = normal hour-based pick)
          JOB_DIGEST_FORCE_FOCUS: ${{ github.event.inputs.force_focus }}
          # Gmail label + skip-inbox applied post-APPEND via IMAP X-GM-LABELS.
          # Gmail filters don't run on APPEND'd messages so this is the only
          # reliable way to label / skip-inbox the digest mail.
          JOB_DIGEST_INBOX_LABEL: ${{ secrets.JOB_DIGEST_INBOX_LABEL }}
          JOB_DIGEST_SKIP_INBOX: ${{ secrets.JOB_DIGEST_SKIP_INBOX }}
        run: |
          mkdir -p digest-data/digests
          EXTRA_FLAGS=""
          if [ "${{ github.event.inputs.ignore_seen_cache }}" = "true" ]; then
            EXTRA_FLAGS="--ignore-seen-cache"
          fi
          python scripts/daily_job_search.py --force --skip-post-hooks --fast-email --skip-enrichment $EXTRA_FLAGS

      - name: Pre-warm application packs
        if: always()
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
        run: |
          BASE="${SITE_URL:-https://adejob.netlify.app}"
          BASE="${BASE%/}"
          echo "Triggering pack pre-warm at $BASE"
          curl -s -m 30 -X POST "$BASE/.netlify/functions/auto-apply-queue-background" \
            -H "Content-Type: application/json" \
            -d '{"mode":"prewarm"}' || echo "prewarm trigger failed (non-fatal)"

      - name: Auto-apply scan (queue review + Telegram)
        if: always()
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
        run: |
          BASE="${SITE_URL:-https://adejob.netlify.app}"
          BASE="${BASE%/}"
          # Scheduled scan: respects the Auto-Apply `enabled` toggle in the portal
          # (skips silently when off). Queues high-fit roles for review and buzzes
          # Telegram with GO/NO-GO. Fire-and-forget — it's a -background function.
          echo "Triggering auto-apply scheduled scan at $BASE"
          curl -s -m 30 -X POST "$BASE/.netlify/functions/auto-apply-queue-background" \
            -H "Content-Type: application/json" \
            -d '{"scheduled":true}' || echo "auto-apply scan trigger failed (non-fatal)"

      - name: Notify auto-apply reviews (Telegram)
        if: always()
        env:
          # config.py mkdir's BASE_DIR at import — must point it at a writable
          # workspace path or it crashes trying to create the default /Users path.
          JOB_DIGEST_BASE_DIR: ${{ github.workspace }}/digest-data
          FIREBASE_SERVICE_ACCOUNT_PATH: secrets/firebase.json
          FIREBASE_COLLECTION: ${{ secrets.FIREBASE_COLLECTION }}
          SITE_URL: ${{ secrets.SITE_URL }}
          AUTO_APPLY_HMAC_SECRET: ${{ secrets.AUTO_APPLY_HMAC_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # Reads jobs the scan just marked review_pending and sends a GO/NO-GO
          # Telegram ping each (dedup via auto_apply_telegram_sent). Polls briefly
          # for the async scan to finish. Fail-soft — never breaks the digest job.
          python scripts/notify_auto_apply_reviews.py || echo "auto-apply telegram notify failed (non-fatal)"

      - name: Sweep digest labels
        if: always()
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          JOB_DIGEST_INBOX_LABEL: ${{ secrets.JOB_DIGEST_INBOX_LABEL }}
          JOB_DIGEST_SKIP_INBOX: ${{ secrets.JOB_DIGEST_SKIP_INBOX }}
        run: |
          # Guarantee every digest (incl. SMTP-fallback deliveries that skip the
          # IMAP label path) ends up under the Job Digest label and out of Primary.
          python scripts/sweep_digest_labels.py || echo "label sweep failed (non-fatal)"

      - name: Save digest state cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: digest-data
          key: digest-state-${{ github.run_id }}

      - name: Upload digest outputs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: digest-outputs-${{ github.run_id }}
          path: |
            digest-data/digests/*.csv
            digest-data/digests/*.xlsx
            digest-data/digests/runner_trace.log
            digest-data/digests/source_diagnostics_*.json
          retention-days: 14
          if-no-files-found: ignore
