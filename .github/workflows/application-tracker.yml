name: Application Tracker (Inbox Mining)

on:
  workflow_dispatch:
    inputs:
      since:
        description: 'Scan mail since this date (YYYY-MM-DD).'
        type: string
        default: '2025-11-27'
      commit_writes:
        description: 'Write to Firestore (true = update jobs + insert events). Default is dry-run.'
        type: boolean
        default: false
      max_messages:
        description: 'Cap on candidate UIDs to process (0 = no cap).'
        type: string
        default: '0'

concurrency:
  group: application-tracker
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install python-dotenv

      - name: Write Firebase service account JSON
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          mkdir -p secrets
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > secrets/firebase.json
          python -c "import json; json.load(open('secrets/firebase.json'))"

      - name: Run inbox tracker
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
          FIREBASE_SERVICE_ACCOUNT_PATH: secrets/firebase.json
          FIREBASE_COLLECTION: ${{ secrets.FIREBASE_COLLECTION }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          JOB_DIGEST_OPENROUTER_MODEL: ${{ secrets.JOB_DIGEST_OPENROUTER_MODEL }}
        run: |
          mkdir -p artefacts
          FLAGS="--since ${{ github.event.inputs.since }} --out artefacts/applications.json --max-messages ${{ github.event.inputs.max_messages }}"
          if [ "${{ github.event.inputs.commit_writes }}" = "true" ]; then
            FLAGS="$FLAGS --commit-writes"
          else
            FLAGS="$FLAGS --dry-run"
          fi
          python scripts/run_inbox_tracker.py $FLAGS

      - name: Upload artefact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: applications-${{ github.run_id }}
          path: artefacts/applications.json
          retention-days: 30
          if-no-files-found: warn
