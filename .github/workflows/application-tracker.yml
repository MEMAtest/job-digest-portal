name: Application Tracker (Inbox Mining)

on:
  schedule:
    # Daily at 06:00 UTC (07:00 BST). Picks up the previous 24h of inbox
    # activity, writes to Firestore, and emails a change notification if
    # anything new landed.
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      since:
        description: 'Scan mail since this date (YYYY-MM-DD).'
        type: string
        default: '2025-11-27'
      commit_writes:
        description: 'Write to Firestore (true = update jobs + insert events). On scheduled runs the default is true.'
        type: boolean
        default: false
      max_messages:
        description: 'Cap on candidate UIDs to process (0 = no cap).'
        type: string
        default: '0'

concurrency:
  group: application-tracker
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install python-dotenv

      - name: Write Firebase service account JSON
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          mkdir -p secrets
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > secrets/firebase.json
          python -c "import json; json.load(open('secrets/firebase.json'))"

      - name: Run inbox tracker
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
          FIREBASE_SERVICE_ACCOUNT_PATH: secrets/firebase.json
          FIREBASE_COLLECTION: ${{ secrets.FIREBASE_COLLECTION }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          JOB_DIGEST_OPENROUTER_MODEL: ${{ secrets.JOB_DIGEST_OPENROUTER_MODEL }}
          # config.py mkdirs JOB_DIGEST_BASE_DIR on import; override the
          # hardcoded local-machine default so it works on the runner.
          JOB_DIGEST_BASE_DIR: ${{ github.workspace }}/digest-data
          EVENT_NAME: ${{ github.event_name }}
          INPUT_SINCE: ${{ github.event.inputs.since }}
          INPUT_COMMIT_WRITES: ${{ github.event.inputs.commit_writes }}
          INPUT_MAX_MESSAGES: ${{ github.event.inputs.max_messages }}
        run: |
          mkdir -p artefacts digest-data/digests
          # Scheduled runs use a rolling 3-day window and default commit_writes=true.
          # Manual dispatch uses the inputs as provided.
          if [ "$EVENT_NAME" = "schedule" ]; then
            SINCE=$(date -u -d '3 days ago' +%Y-%m-%d)
            COMMIT="true"
            MAX="0"
          else
            SINCE="${INPUT_SINCE:-2025-11-27}"
            COMMIT="${INPUT_COMMIT_WRITES:-false}"
            MAX="${INPUT_MAX_MESSAGES:-0}"
          fi
          FLAGS="--since $SINCE --out artefacts/applications.json --max-messages $MAX"
          if [ "$COMMIT" = "true" ]; then
            FLAGS="$FLAGS --commit-writes"
          else
            FLAGS="$FLAGS --dry-run"
          fi
          echo "Resolved flags: $FLAGS (event=$EVENT_NAME)"
          python scripts/run_inbox_tracker.py $FLAGS

      - name: Upload artefact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: applications-${{ github.run_id }}
          path: artefacts/applications.json
          retention-days: 30
          if-no-files-found: warn
